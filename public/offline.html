<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BMPnet Portal Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #faf8ff;
        color: #191b23;
        font-family: Inter, system-ui, sans-serif;
      }
      .card {
        width: min(92vw, 420px);
        padding: 24px;
        border-radius: 20px;
        background: #fff;
        border: 1px solid #c3c6d6;
        text-align: center;
        box-shadow: 0 12px 30px rgba(0, 61, 155, 0.08);
      }
      .logo {
        width: 72px;
        height: 72px;
        margin: 0 auto 18px;
        border-radius: 20px;
        display: grid;
        place-items: center;
        background: linear-gradient(180deg, #0b4fc2 0%, #003d9b 100%);
        color: #fff;
        font-size: 26px;
        font-weight: 800;
      }
      h1 {
        margin: 0;
        font-size: 22px;
      }
      p {
        margin: 12px 0 0;
        color: #434654;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="logo">BMP</div>
      <h1>Portal sedang offline</h1>
      <p>Koneksi internet tidak tersedia. Silakan buka kembali saat perangkat sudah online.</p>
    </div>
  </body>
  </html>
