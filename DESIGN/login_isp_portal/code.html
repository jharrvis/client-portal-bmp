                    "spacing": {

                    "fontFamily": {

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #faf8ff;
            font-family: 'Inter', sans-serif;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-background text-on-background min-h-screen flex flex-col items-center justify-center p-container-margin relative overflow-hidden">
<!-- Background Texture/Visual -->
<div class="absolute inset-0 z-0 opacity-10 pointer-events-none">
<div class="absolute top-0 right-0 w-[800px] h-[800px] bg-primary rounded-full blur-[120px] -mr-96 -mt-96"></div>
<div class="absolute bottom-0 left-0 w-[600px] h-[600px] bg-secondary rounded-full blur-[100px] -ml-72 -mb-72"></div>
<img class="w-full h-full object-cover mix-blend-overlay" data-alt="A sophisticated macro view of a high-tech server room with fiber optic cables glowing in soft blue and white light. The image features a clean, technical aesthetic with shallow depth of field, emphasizing high-speed data transmission and network reliability. The mood is professional, secure, and modern, perfectly complementing a corporate ISP portal theme." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDuETnyJBPgbzHav2-zIAryoX0dSrlDs-E_lkDu1R46jPU4ZNHi3t7gjsOyKD4CWC4UULl252H5JIIYEf1yUODOl73DMco2SRnNsup05pJyjueJkD-FZFZnS7CY2QRZ0obgLckE_AbqPU-ToenXv3dTIy1gBs1ZKg3ODOTTDIlYvDkrs0vAJfkiqH2Ff1VL7ezuf3WJY8JvSCibi43AQL1XEgy_shNzWRJVuzdWrwTEheXILeKSDb973Bmelb0MpkqJXWPOdIrrhg"/>
</div>
<!-- Login Container -->
<main class="w-full max-w-[440px] z-10 flex flex-col gap-stack-lg">
<!-- Brand Identity -->
<div class="flex flex-col items-center text-center gap-stack-sm">
<div class="flex items-center justify-center w-16 h-16 bg-primary rounded-xl text-on-primary shadow-lg mb-stack-sm">
<span class="material-symbols-outlined text-[40px]" data-icon="signal_cellular_alt">signal_cellular_alt</span>
</div>
<h1 class="font-headline-md text-headline-md text-primary tracking-tight">ISP Portal</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Sign in to manage your high-speed connection</p>
</div>
<!-- Login Form Card -->
<div class="bg-surface-container-lowest border border-outline-variant rounded-xl p-stack-lg shadow-sm">
<form class="flex flex-col gap-stack-md">
<!-- Username Field -->
<div class="flex flex-col gap-stack-sm">
<label class="font-label-caps text-label-caps text-on-surface-variant" for="username">Username or Customer ID</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors" data-icon="person">person</span>
<input class="w-full h-12 pl-12 pr-4 bg-surface-container-low border border-outline-variant rounded-lg font-body-md text-body-md focus:ring-1 focus:ring-primary focus:border-primary outline-none transition-all placeholder:text-outline-variant" id="username" placeholder="e.g. ISP-98421" type="text"/>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-stack-sm">
<div class="flex justify-between items-center">
<label class="font-label-caps text-label-caps text-on-surface-variant" for="password">Password</label>
<a class="font-label-caps text-label-caps text-primary hover:underline" href="#">Forgot Password</a>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors" data-icon="lock">lock</span>
<input class="w-full h-12 pl-12 pr-12 bg-surface-container-low border border-outline-variant rounded-lg font-body-md text-body-md focus:ring-1 focus:ring-primary focus:border-primary outline-none transition-all placeholder:text-outline-variant" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Remember Me Toggle -->
<div class="flex items-center gap-stack-sm py-unit">
<div class="relative flex items-center">
<input class="w-5 h-5 rounded border-outline-variant text-primary focus:ring-primary-container cursor-pointer" id="remember" type="checkbox"/>
</div>
<label class="font-body-sm text-body-sm text-on-surface-variant cursor-pointer select-none" for="remember">Remember this device</label>
</div>
<!-- Submit Button -->
<button class="w-full h-12 bg-primary text-on-primary rounded-lg font-title-sm text-title-sm flex items-center justify-center gap-2 hover:bg-primary-container active:scale-[0.98] transition-all shadow-sm mt-stack-sm" type="submit">
<span>Login</span>
<span class="material-symbols-outlined text-[20px]" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
</div>
<!-- Footer Links -->
<div class="flex flex-col items-center gap-stack-md pt-stack-sm">
<div class="flex items-center gap-stack-lg">
<a class="flex items-center gap-2 text-on-surface-variant hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined text-[18px]" data-icon="help_outline">help_outline</span>
<span class="font-label-caps text-label-caps">Support Center</span>
</a>
<span class="w-[1px] h-4 bg-outline-variant"></span>
<a class="flex items-center gap-2 text-on-surface-variant hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined text-[18px]" data-icon="shield">shield</span>
<span class="font-label-caps text-label-caps">Privacy Policy</span>
</a>
</div>
<!-- Security Badge -->
<div class="flex items-center gap-2 px-4 py-2 bg-surface-container-high rounded-full border border-outline-variant">
<span class="material-symbols-outlined text-[16px] text-secondary" data-icon="verified_user" style="font-variation-settings: 'FILL' 1;">verified_user</span>
<span class="font-label-caps text-label-caps text-on-surface-variant uppercase text-[10px]">Secure 256-bit AES Encrypted</span>
</div>
</div>
</main>
<!-- Version Tag -->
<div class="fixed bottom-container-margin right-container-margin font-mono-data text-mono-data text-outline-variant opacity-50">
        v2.4.0
    </div>
</body></html>
